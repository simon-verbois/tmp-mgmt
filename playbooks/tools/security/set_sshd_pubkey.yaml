---
- name: Security - Migrate SSH authorized keys to drop-in directory
  hosts: all
  become: yes
  gather_facts: true

# Usage
# ansible-playbook playbooks/tools/security/set_sshd_pubkey.yaml -i sv-xxxxlvuxx.rh.xxxx.local,

  handlers:
    - name: Restart SSHD
      ansible.builtin.service:
        name: sshd
        state: restarted

  tasks:
    - name: Remove the old Ansible block from main sshd_config
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        marker: "# {mark} ANSIBLE MANAGED BLOCK FOR IPA KEYS"
        state: absent
      notify: Restart SSHD

    - name: MODERN OS - Configure SSH via drop-in directory
      when: ansible_distribution_major_version | int >= 8
      block:
        - name: Ensure /etc/ssh/sshd_config.d directory exists
          ansible.builtin.file:
            path: /etc/ssh/sshd_config.d
            state: directory
            mode: '0755'

        - name: Get first line of sshd_config
          ansible.builtin.command: head -1 /etc/ssh/sshd_config
          register: first_line
          changed_when: false
          check_mode: false

        - name: Comment out wildcard Include if it is the very first line
          ansible.builtin.replace:
            path: /etc/ssh/sshd_config
            regexp: '^(Include /etc/ssh/sshd_config\.d/\*\.conf)$'
            replace: '#\1'
            validate: '/usr/sbin/sshd -t -f %s'
          when: first_line.stdout | trim == 'Include /etc/ssh/sshd_config.d/*.conf'
          notify: Restart SSHD

        - name: Remove any misplaced or wildcard Include directives
          ansible.builtin.lineinfile:
            path: /etc/ssh/sshd_config
            regexp: '^\s*Include\s+/etc/ssh/sshd_config\.d/'
            state: absent

        - name: Ensure specific Include directive is present at BOF
          ansible.builtin.lineinfile:
            path: /etc/ssh/sshd_config
            line: "Include /etc/ssh/sshd_config.d/04-ipa.conf"
            insertbefore: BOF
            validate: '/usr/sbin/sshd -t -f %s'
          notify: Restart SSHD

        - name: Configure IPA SSH keys via 04-ipa.conf drop-in file
          ansible.builtin.copy:
            dest: /etc/ssh/sshd_config.d/04-ipa.conf
            content: |
              PubkeyAuthentication yes
              AuthorizedKeysCommand /usr/bin/sss_ssh_authorizedkeys
              AuthorizedKeysCommandUser root
            mode: '0600'
          notify: Restart SSHD

    - name: LEGACY OS - Configure SSH directly in sshd_config
      when: ansible_distribution_major_version | int <= 7
      block:
        - name: Insert the IPA keys block at the beginning of the file (BOF)
          ansible.builtin.blockinfile:
            path: /etc/ssh/sshd_config
            marker: "# {mark} ANSIBLE MANAGED BLOCK FOR IPA KEYS"
            insertbefore: BOF
            block: |
              PubkeyAuthentication yes
              AuthorizedKeysCommand /usr/bin/sss_ssh_authorizedkeys
              AuthorizedKeysCommandUser root
            validate: '/usr/sbin/sshd -t -f %s'
          notify: Restart SSHD

    - name: Validate overall SSHD configuration
      ansible.builtin.command: /usr/sbin/sshd -t
      changed_when: false