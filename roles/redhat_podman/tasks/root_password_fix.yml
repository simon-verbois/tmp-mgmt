# roles/redhat_podman/tasks/root_password_fix.yml

---
- name: Check root password status
  ansible.builtin.command: passwd -S root
  register: root_passwd_status
  changed_when: false
  failed_when: false

- name: Check root password expiration details
  ansible.builtin.command: chage -l root
  register: root_chage_status
  changed_when: false
  failed_when: false

- name: Detect if root password requires reset
  ansible.builtin.set_fact:
    root_password_needs_fix: "{{ 'password must be changed' in root_chage_status.stdout }}"

- name: Display root password issue if detected
  ansible.builtin.debug:
    msg:
      - "⚠ Root password authentication issue detected"
      - "Status: {{ root_passwd_status.stdout }}"
      - "Applying fix via 'user' module..."
  when: root_password_needs_fix | bool

- name: Apply root password fix
  when: root_password_needs_fix | bool
  block:
    # 1. Génération du mot de passe
    - name: Generate secure root password
      ansible.builtin.set_fact:
        new_root_password: >-
          {{ lookup('password', '/dev/null chars="cbdefghijklnrtuv" length=5') +
             lookup('password', '/dev/null chars="CBDEFGHIJKLNRTUV" length=5') +
             lookup('password', '/dev/null chars="0123456789" length=5') +
             lookup('password', '/dev/null chars="*+-/" length=5') }}
      no_log: true

    - name: Shuffle password characters
      ansible.builtin.set_fact:
        new_root_password: "{{ new_root_password | list | shuffle | join('') }}"
      no_log: true

    # 2. Application du mot de passe
    - name: Update root password
      ansible.builtin.user:
        name: root
        password: "{{ new_root_password | password_hash('sha512') }}"
      no_log: true

    # 3. Sauvegarde locale DANS LE HOME USER (Hors du projet Git)
    - name: Create password storage directory in user home
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/credentials"
        state: directory
        mode: '0700'
      delegate_to: localhost
      run_once: true

    - name: Store root password in user home
      ansible.builtin.copy:
        content: |
          # Root password for {{ inventory_hostname }}
          # Generated: {{ ansible_date_time.iso8601 }}

          Username: root
          Password: {{ new_root_password }}
        dest: "{{ lookup('env', 'HOME') }}/credentials/root_password_{{ inventory_hostname }}.txt"
        mode: '0600'
      delegate_to: localhost
      no_log: true

    - name: Display password storage location
      ansible.builtin.debug:
        msg: "✓ Password stored in: {{ lookup('env', 'HOME') }}/credentials/root_password_{{ inventory_hostname }}.txt"

    # 4. Ajustement de l'expiration
    - name: Reset last password change date to never
      ansible.builtin.command: chage -d -1 root
      changed_when: true

    - name: Set password expiration settings
      ansible.builtin.command: "{{ item }}"
      loop:
        - chage -M 99999 root
        - chage -I -1 root
        - chage -m 0 root
        - chage -W 7 root
      changed_when: true
