# roles/redhat_idm/tasks/manage/users/deletion/loop_on_users.yaml

---
- name: Include delete user tasks
  ansible.builtin.include_tasks: delete_user.yaml

- name: Append result to rows
  ansible.builtin.set_fact:
    result_rows: "{{ result_rows + [row] }}"
  vars:
    row:
      username: "{{ username }}"
      status: "{{ user_status }}"
      client_id: "{{ client_id }}"
      ipa_domain: "{{ ipa_domain }}"
