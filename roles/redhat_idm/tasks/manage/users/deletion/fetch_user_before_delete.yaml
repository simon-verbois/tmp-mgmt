# roles/redhat_idm/tasks/manage/users/deletion/fetch_user_before_delete.yaml

---
- name: "Authenticate to IPA via Kerberos ({{ ipa_server }})"
  delegate_to: "{{ ipa_server }}"
  ansible.builtin.shell: "echo -n '{{ ipa_pass }}' | kinit {{ ipa_user }}"
  environment:
    KRB5CCNAME: "/tmp/laf_krb_del_{{ ipa_server }}_{{ username }}"
  no_log: true
  changed_when: false
  failed_when: false

- name: "Fetch user data before deletion ({{ username }})"
  delegate_to: "{{ ipa_server }}"
  ansible.builtin.shell: >-
    curl -s -k --negotiate -u :
    -H 'Content-Type: application/json'
    -H 'Referer: https://{{ ipa_server }}/ipa'
    --data-binary '{"method":"user_show","params":[["{{ username }}"],{"all":true}],"id":0}'
    'https://{{ ipa_server }}/ipa/json'
  environment:
    KRB5CCNAME: "/tmp/laf_krb_del_{{ ipa_server }}_{{ username }}"
  changed_when: false
  failed_when: false
  register: user_show_raw

- name: "Destroy Kerberos ticket ({{ ipa_server }})"
  delegate_to: "{{ ipa_server }}"
  ansible.builtin.shell: "kdestroy"
  environment:
    KRB5CCNAME: "/tmp/laf_krb_del_{{ ipa_server }}_{{ username }}"
  changed_when: false
  failed_when: false
  no_log: true

- name: "Parse user data and build data_prompted recreation line"
  ansible.builtin.set_fact:
    recreation_command: >-
      {%- set raw = user_show_raw.stdout | default('') -%}
      {%- if raw | length > 0 and raw[0] == '{' -%}
        {%- set parsed = raw | from_json -%}
        {%- if parsed.get('error') is none and parsed.get('result') is defined -%}
          {%- set u = parsed.result.result -%}
          {%- set fn = u.get('givenname', [''])[0] -%}
          {%- set ln = u.get('sn', [''])[0] -%}
          {%- set mail = u.get('mail', [''])[0] -%}
          {%- set groups = u.get('memberof_group', []) | join(',') -%}
          {%- set uid = u.get('uidnumber', [''])[0] | string -%}
          {{ username }};{{ fn }};{{ ln }};{{ mail }};{{ groups }}
          {%- if uid %};{{ uid }}{% endif %}
        {%- else -%}
          -
        {%- endif -%}
      {%- else -%}
        -
      {%- endif -%}
