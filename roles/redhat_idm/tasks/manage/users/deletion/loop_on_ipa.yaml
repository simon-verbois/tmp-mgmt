# roles/redhat_idm/tasks/manage/users/deletion/loop_on_ipa.yaml

---
- name: Initialize result rows
  ansible.builtin.set_fact:
    result_rows: []

- block:
  - name: Failed if __username is empty
    ansible.builtin.fail:
      msg: "__username is empty, stopping execution."
    when: __username | length == 0

  - name: Loop on __username list
    ansible.builtin.include_tasks: loop_on_users.yaml
    loop: '{{ __username | split(";") }}'
    loop_control:
      loop_var: username

  - name: Deploy manage XLSX script
    delegate_to: localhost
    ansible.builtin.copy:
      src: "{{ role_path }}/files/generate_xlsx_manage.py"
      dest: "{{ working_dir }}/generate_xlsx_manage.py"
      mode: "0755"
    run_once: true

  - name: Save result rows to JSON
    delegate_to: localhost
    ansible.builtin.copy:
      dest: "{{ working_dir }}/manage_deletion_{{ current_ipa.key }}.json"
      content: "{{ payload | to_json }}"
      mode: "0600"
    vars:
      payload:
        operation: "deletion"
        meta:
          client_id: "{{ client_id }}"
          ipa_domain: "{{ ipa_domain }}"
          ipa_server: "{{ ipa_server }}"
          generated_at: "{{ now(fmt='%Y-%m-%d %H:%M:%S') }}"
        rows: "{{ result_rows }}"

  - name: "Generate XLSX for {{ current_ipa.key }}"
    delegate_to: localhost
    ansible.builtin.command: >-
      python3 {{ working_dir }}/generate_xlsx_manage.py
      {{ working_dir }}/manage_deletion_{{ current_ipa.key }}.json
      {{ working_dir }}/ipa_deletion_{{ current_ipa.key }}_{{ now(fmt='%Y%m%d-%H%M') }}.xlsx
    changed_when: true

  rescue:
  - name: Fill mail_content with error message
    ansible.builtin.set_fact:
      mail_content: |-
        {{ mail_content }}
        The __username list cannot be empty, stopping execution.
