# roles/redhat_idm/tasks/manage/users/remove_group/loop_on_users.yaml

---
- name: Set username from loop var
  ansible.builtin.set_fact:
    username: "{{ loop_username }}"

- name: Loop on user_groups list
  ansible.builtin.include_tasks: loop_on_groups.yaml
  loop: "{{ user_groups | regex_replace('[,\\s]+', ',') | split(',') | select | list }}"
  loop_control:
    loop_var: groupname
