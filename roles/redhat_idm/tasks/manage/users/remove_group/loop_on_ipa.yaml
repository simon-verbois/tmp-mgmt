# roles/redhat_idm/tasks/manage/users/remove_group/loop_on_ipa.yaml

---
- name: Initialize result rows
  ansible.builtin.set_fact:
    result_rows: []

- block:
  - name: Assert usernames is provided
    ansible.builtin.assert:
      that:
        - usernames | default('') | length > 0
      fail_msg: "'usernames' must be provided and non-empty (separate multiple users with ';')."

  - name: Loop on usernames list
    ansible.builtin.include_tasks: loop_on_users.yaml
    loop: '{{ usernames | split(";") }}'
    loop_control:
      loop_var: loop_username

  - name: Deploy manage XLSX script
    delegate_to: localhost
    ansible.builtin.copy:
      src: "{{ role_path }}/files/generate_xlsx_manage.py"
      dest: "{{ working_dir }}/generate_xlsx_manage.py"
      mode: "0755"
    run_once: true

  - name: Save result rows to JSON
    delegate_to: localhost
    ansible.builtin.copy:
      dest: "{{ working_dir }}/manage_remove_group_{{ current_ipa.key }}.json"
      content: "{{ payload | to_json }}"
      mode: "0600"
    vars:
      payload:
        operation: "remove_group"
        meta:
          client_id: "{{ client_id }}"
          ipa_domain: "{{ ipa_domain }}"
          ipa_server: "{{ ipa_server }}"
          generated_at: "{{ now(fmt='%Y-%m-%d %H:%M:%S') }}"
        rows: "{{ result_rows }}"

  - name: "Generate XLSX for {{ current_ipa.key }}"
    delegate_to: localhost
    ansible.builtin.command: >-
      python3 {{ working_dir }}/generate_xlsx_manage.py
      {{ working_dir }}/manage_remove_group_{{ current_ipa.key }}.json
      {{ working_dir }}/ipa_remove_group_{{ current_ipa.key }}_{{ now(fmt='%Y%m%d-%H%M') }}.xlsx
    changed_when: true

  rescue:
  - name: Fill mail_content with error message
    ansible.builtin.set_fact:
      mail_content: |-
        {{ mail_content }}
        The 'usernames' variable must be provided and non-empty, stopping execution.
