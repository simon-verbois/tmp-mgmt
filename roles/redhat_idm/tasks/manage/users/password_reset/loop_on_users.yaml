# roles/redhat_idm/tasks/manage/users/password_reset/loop_on_users.yaml

---
- name: Generate random password
  ansible.builtin.set_fact:
    generated_password: "{{ lookup('community.general.random_string', length=20, override_special='%()+-/<=>?^_') }}"
  no_log: true

- name: Include reset user password tasks
  ansible.builtin.include_tasks: reset_password.yaml

- name: Save per-user result to JSON
  delegate_to: localhost
  ansible.builtin.copy:
    dest: "{{ working_dir }}/manage_password_reset_{{ current_ipa.key }}_{{ username }}.json"
    content: "{{ payload | to_json }}"
    mode: "0600"
  no_log: true
  vars:
    payload:
      operation: "password_reset"
      meta:
        client_id: "{{ client_id }}"
        ipa_domain: "{{ ipa_domain }}"
        ipa_server: "{{ ipa_server }}"
        generated_at: "{{ now(fmt='%Y-%m-%d %H:%M:%S') }}"
      rows:
        - username: "{{ username }}"
          status: "{{ user_status }}"
          password: "{{ generated_password }}"
          client_id: "{{ client_id }}"
          ipa_domain: "{{ ipa_domain }}"

- name: Generate XLSX for {{ username }}
  delegate_to: localhost
  ansible.builtin.command: >-
    python3 {{ working_dir }}/generate_xlsx_manage.py
    {{ working_dir }}/manage_password_reset_{{ current_ipa.key }}_{{ username }}.json
    {{ working_dir }}/ipa_password_reset_{{ current_ipa.key }}_{{ username }}_{{ now(fmt='%Y%m%d-%H%M') }}.xlsx
  changed_when: true
