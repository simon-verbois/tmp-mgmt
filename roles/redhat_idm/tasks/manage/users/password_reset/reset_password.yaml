# roles/redhat_idm/tasks/manage/users/password_reset/03_reset_user_password.yaml

---
- block:
  - name: Reset password for {{ username }}
    delegate_to: "{{ ipa_server }}"
    redhat.rhel_idm.ipauser:
      name: "{{ username }}"
      password: "{{ generated_password }}"
      update_password: always
      ipaadmin_principal: "{{ ipa_user }}"
      ipaadmin_password: "{{ ipa_pass }}"
    register: password_reset_result

  - name: Update mail_content based on password reset status
    ansible.builtin.set_fact:
      mail_content: |
        {{ mail_content }}
        {{ ipa_domain }} - {{ username }} account password has been correctly reset.<br>

  rescue:
  - name: Fill mail_content with error message
    ansible.builtin.set_fact:
      mail_content: |-
        {{ mail_content }}
        <b>{{ ipa_domain }} - ⚠️ Failed to reset {{ username | default('username-var') }} account password.</b><br>
          <pre style="background-color: #f0f0f0; padding: 10px; border: 1px solid #ccc;">
          {% if password_reset_result.msg == 'First name is needed' %}
          {{ username }} doesn't exist on this IPA server.
          {% else %}
          {{ password_reset_result.msg | default('No msg captured') }}
          {% endif %}
          </pre>
