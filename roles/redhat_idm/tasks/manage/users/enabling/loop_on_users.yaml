# roles/redhat_idm/tasks/manage/users/enabling/02_loop_on_users.yaml

---
- name: Generate random password
  ansible.builtin.set_fact:
    generated_password: "{{ lookup('community.general.random_string', length=20, override_special='%()+-/<=>?^_') }}"
  no_log: true

- name: Include enable user tasks
  ansible.builtin.include_tasks: enable_user.yaml

- name: Include reset user password tasks
  ansible.builtin.include_tasks: reset_password.yaml

- name: Append result data to csv
  ansible.builtin.set_fact:
    csv_lines: "{{ csv_lines }}{{ username }},\
                {{ generated_password }},\
                {{ 'Enabled' if user_enabling_result.changed | default(false) else 'Doesn''t exist on this IPA' }},\
                {{ client_id }},\
                {{ ipa_domain }};"
