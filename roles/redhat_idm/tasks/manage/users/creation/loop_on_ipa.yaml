# roles/redhat_idm/tasks/manage/users/creation/loop_on_ipa.yaml

---
- name: Deploy manage XLSX script
  delegate_to: localhost
  ansible.builtin.copy:
    src: "{{ role_path }}/files/generate_xlsx_manage.py"
    dest: "{{ working_dir }}/generate_xlsx_manage.py"
    mode: "0755"
  run_once: true

- block:
  - name: Assert required variables for creation
    ansible.builtin.assert:
      that:
        - (data_prompted | default('') | length > 0) or
          (usernames | default('') | length > 0 and
           user_firstname | default('') | length > 0 and
           user_lastname | default('') | length > 0)
      fail_msg: >-
        Provide either 'data_prompted' (bulk mode) or at minimum
        'usernames', 'user_firstname' and 'user_lastname' (single-user mode).

  - name: Parse user data into a dictionary
    ansible.builtin.set_fact:
      users_dict: >-
        {%- set result = {} -%}

        {%- if data_prompted is defined and data_prompted | string | trim | length > 0 -%}
          {%- set lines = data_prompted.strip().split('\n') -%}
          {%- for line in lines -%}
            {%- if line | trim | length > 0 -%}
              {%- set fields = line.split(';') -%}
              {%- if fields | length >= 5 -%}
                {%- set _ = result.update({
                  fields[0]: {
                    'firstname': fields[1],
                    'lastname': fields[2],
                    'mail': fields[3],
                    'groups': fields[4],
                    'homefolder': ipa_default_homedir + '/' + fields[0],
                    'shell': ipa_default_shell,
                    'service_account': 'maxlife' in (fields[4].split(',') | map('trim') | list),
                    'uidnumber': fields[5] | trim if fields | length > 5 and fields[5] | trim | length > 0 else ''
                  }
                }) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}

        {%- else -%}
          {%- if usernames is defined and not (usernames | string).startswith('{{') -%}
            {%- set _ = result.update({
              usernames: {
                'firstname': user_firstname,
                'lastname': user_lastname,
                'mail': user_mail,
                'groups': user_groups,
                'homefolder': ipa_default_homedir + '/' + usernames,
                'shell': ipa_default_shell,
                'service_account': user_service_account | default(false) | bool,
                'uidnumber': user_uidnumber | default('')
              }
            }) -%}
          {%- endif -%}
        {%- endif -%}

        {{ result }}

  - name: Failed if users_dict is empty
    ansible.builtin.fail:
      msg: "users_dict is empty, stopping execution."
    when: users_dict | length == 0

  - name: Loop on users dict
    ansible.builtin.include_tasks: loop_on_users.yaml
    loop: '{{ users_dict | dict2items }}'
    loop_control:
      loop_var: user_infos
      label: "Sensitive data is hidden."
    vars:
      username: "{{ user_infos.key }}"
      user_firstname: "{{ user_infos.value.firstname }}"
      user_lastname: "{{ user_infos.value.lastname }}"
      user_mail: "{{ user_infos.value.mail }}"
      user_groups: "{{ user_infos.value.groups }}"
      user_homefolder: "{{ user_infos.value.homefolder }}"
      user_shell: "{{ user_infos.value.shell }}"
      user_service_account: "{{ user_infos.value.service_account }}"
      user_uidnumber: "{{ user_infos.value.uidnumber | default('') }}"

  rescue:
  - name: Fill mail_content with error message
    ansible.builtin.set_fact:
      mail_content: |-
        {{ mail_content }}
        The user_dict dict cannot be empty, stopping execution.
