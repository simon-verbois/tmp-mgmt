# roles/redhat_idm/tasks/manage/users/add_pubkey/loop_on_users.yaml

---
- name: Determine target username (user or altusername)
  ansible.builtin.set_fact:
    target_username: >-
      {{
        item.altusername
        if (client_id | default('') | string in use_altusername | map('string') | list and item.altusername | default('') != '')
        else item.user
      }}

- name: "Inject SSH key for {{ target_username }}"
  delegate_to: "{{ ipa_server }}"
  redhat.rhel_idm.ipauser:
    ipaadmin_principal: "{{ ipa_user }}"
    ipaadmin_password: "{{ ipa_pass }}"
    name: "{{ target_username }}"
    sshpubkey:
      - "{{ item.pubkey }}"
    state: present
  when: item.pubkey is defined
  register: ipa_result
  ignore_errors: true

- name: Define status for {{ target_username }}
  ansible.builtin.set_fact:
    pubkey_status: >-
      {% if item.pubkey is not defined %}No key
      {% elif ipa_result.failed | default(false) %}Error: {{ ipa_result.msg | default('Unknown error') | truncate(80) }}
      {% elif ipa_result.changed %}Injected
      {% else %}OK{% endif %}

- name: Append result to rows
  ansible.builtin.set_fact:
    result_rows: "{{ result_rows + [row] }}"
  vars:
    row:
      username: "{{ target_username }}"
      status: "{{ pubkey_status | trim }}"
      ipa_server: "{{ ipa_server }}"
