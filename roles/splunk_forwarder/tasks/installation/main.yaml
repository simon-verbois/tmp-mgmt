# roles/splunk_forwarder/tasks/install_forwarder/main.yaml

---
- name: Generate random password for splunkfw admin
  ansible.builtin.set_fact:
    splunkfw_password: "{{ lookup('community.general.random_string', length=20, override_special='%()+-/<=>?^_') }}"

- name: "Create the {{ __splunkfw_group }} group"
  ansible.builtin.group:
    name: "{{ __splunkfw_group }}"
    state: present

- name: "Create the {{ __splunkfw_user }} user"
  ansible.builtin.user:
    name: "{{ __splunkfw_user }}"
    group: "{{ __splunkfw_group }}"
    create_home: yes
    state: present

- name: "Apply standard read/execute ACL recursively for {{ __splunkfw_user }} on /var/log"
  ansible.posix.acl:
    path: /var/log
    entity: "{{ __splunkfw_user }}"
    etype: user
    permissions: r-x
    recursive: yes
    state: present

- name: "Apply default read/execute ACL recursively for {{ __splunkfw_user }} on /var/log"
  ansible.posix.acl:
    path: /var/log
    entity: "{{ __splunkfw_user }}"
    etype: user
    permissions: r-x
    default: yes
    recursive: yes
    state: present

- name: Create the splunk directory and set permissions
  ansible.builtin.file:
    path: /opt/splunkforwarder/etc/system/local/
    state: directory
    owner: "{{ __splunkfw_user }}"
    group: "{{ __splunkfw_group }}"
    recurse: yes

- name: Tranfert splunk templates
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { src: "splunkfw.repo.j2", dest: "/etc/yum.repos.d/splunkfw.repo", owner: "root", group: "root", mode: "0644" }
    - { src: "deploymentclient.conf.j2", dest: "/opt/splunkforwarder/etc/system/local/deploymentclient.conf", owner: "{{ __splunkfw_user }}", group: "{{ __splunkfw_group }}", mode: "0600" }
    - { src: "user-seed.conf.j2", dest: "/opt/splunkforwarder/etc/system/local/user-seed.conf", owner: "{{ __splunkfw_user }}", group: "{{ __splunkfw_group }}", mode: "0600" }

- name: "Install {{ __splunkfw_package }} (RHEL 7)"
  ansible.builtin.yum:
    name: "{{ __splunkfw_package }}"
    state: latest
    disable_gpg_check: true
    update_cache: true
  when: ansible_facts['distribution_major_version'] == "7"

- name: "Install {{ __splunkfw_package }} (RHEL 8+)"
  ansible.builtin.dnf:
    name: "{{ __splunkfw_package }}"
    disable_gpg_check: true
    state: latest
    update_cache: true
  when: ansible_facts['distribution_major_version'] | int >= 8

- name: Create Splunk Forwarder service
  ansible.builtin.command:
    cmd: /opt/splunkforwarder/bin/splunk enable boot-start --accept-license
  register: splunk_boot_result
  failed_when: splunk_boot_result.rc not in [0, 4]
  changed_when: splunk_boot_result.rc == 0

- name: Start and enable Splunk Forwarder
  ansible.builtin.service:
    name: "{{ __splunkfw_service }}"
    state: started
    enabled: true
