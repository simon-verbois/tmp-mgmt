# roles/tools/tasks/server_extend_lvm_volume/main.yaml

---
- name: "Determine run mode"
  ansible.builtin.set_fact:
    dry_run: "{{ auth_token is not defined or auth_token | length == 0 }}"

- name: "Assert required variables"
  ansible.builtin.assert:
    that:
      - target_path is defined
      - requested_add_size_gb is defined
    fail_msg: "Variables 'target_path' and 'requested_add_size_gb' must be defined."

- name: "Gather LVM topology for {{ target_path }}"
  ansible.builtin.include_tasks: checks/gather_lvm_info.yaml

- name: "Abort execution if LUKS encryption detected"
  ansible.builtin.fail:
    msg: "LUKS encryption detected on {{ lvm_info.pv_device }}: automatic extension is not supported for encrypted volumes. Perform the extension manually."
  when:
    - not dry_run | bool
    - lvm_info.is_luks == 'true'

- name: "Calculate vCenter disk extension need"
  ansible.builtin.include_tasks: checks/calculate_vcenter_need.yaml

- name: "Gather vCenter disk information"
  ansible.builtin.include_tasks: vcenter/main.yaml
  vars:
    vcenter_action: "get_disk_info"
  when: vcenter_disk_add_gb | int > 0

- name: "Match OS disk to vCenter disk"
  ansible.builtin.include_tasks: checks/match_vcenter_disk.yaml
  when: vcenter_disk_add_gb | int > 0

- name: "Check datastore available space"
  ansible.builtin.include_tasks: checks/check_datastore_space.yaml
  when:
    - vcenter_disk_add_gb | int > 0
    - vcenter_match_error is not defined

- name: "Abort execution if vCenter checks failed"
  ansible.builtin.fail:
    msg: "{{ vcenter_match_error | default(datastore_error) }}"
  when:
    - not dry_run | bool
    - vcenter_match_error is defined or datastore_error is defined

- name: "Include dry-run report and stop"
  ansible.builtin.include_tasks: dry_run.yaml
  when: dry_run | bool

- name: "Verify authorization token"
  ansible.builtin.include_tasks: checks/verify_token.yaml

- name: "Extend vCenter disk"
  ansible.builtin.include_tasks: vcenter/main.yaml
  vars:
    vcenter_action: "extend_disk"
  when: vcenter_disk_add_gb | int > 0

- name: "Abort if vCenter disk extension failed on all vCenters"
  ansible.builtin.fail:
    msg: >-
      vCenter disk extension was required (+{{ vcenter_disk_add_gb }} GB) but failed on all vCenters.
      The host LVM extension cannot proceed without the additional disk space.
      Last error: {{ vcenter_extension_error | default('unknown') }}
  when:
    - vcenter_disk_add_gb | int > 0
    - not vcenter_action_done | bool

- name: "Extend LVM and filesystem"
  ansible.builtin.include_tasks: host/extend_lvm.yaml
