# roles/tools/tasks/server_diagnostic/tests/storage.yaml

---
- name: "Add Storage header"
  ansible.builtin.set_fact:
    mail_content: |-
      {{ mail_content }}
      <br>
      <br>
      <div style="border: 1px solid #333; padding: 8px; text-align: center; border-radius: 5px; margin-bottom: 10px; background-color: #f9f9f9;">
        <b style="font-size: 1.3em;">Storage</b>
      </div>

- block:
    - name: Get disk usage details
      ansible.builtin.shell: df -x tmpfs -x devtmpfs -Ph | tail -n +2 | awk '{print $1";"$2";"$3";"$4";"$5";"$6}'
      delegate_to: "{{ target_server }}"
      become: true
      register: df_result

    - name: Check for Read-Only filesystems
      ansible.builtin.shell: grep '[[:space:]]ro[[:comma:],]' /proc/mounts | grep -vE 'tmpfs|devtmpfs|loop' || true
      delegate_to: "{{ target_server }}"
      register: ro_mounts

    - name: Get partitions from fstab
      ansible.builtin.shell: grep -vE '^#|^$|swap|tmpfs|devpts|proc|sysfs' /etc/fstab | awk '{print $2}'
      delegate_to: "{{ target_server }}"
      register: fstab_mounts

    - name: Get currently mounted partitions
      ansible.builtin.shell: mount | awk '{print $3}'
      delegate_to: "{{ target_server }}"
      register: current_mounts

    - name: Identify missing mounts
      ansible.builtin.set_fact:
        missing_mounts: "{{ fstab_mounts.stdout_lines | difference(current_mounts.stdout_lines) }}"

    - name: Analyze disk thresholds
      ansible.builtin.set_fact:
        critical_disks: "{{ df_result.stdout_lines | map('split', ';') | selectattr(4, 'search', '9[0-9]%|100%') | list }}"
        warning_disks: "{{ df_result.stdout_lines | map('split', ';') | selectattr(4, 'search', '8[0-9]%') | list }}"
        has_ro_disks: "{{ ro_mounts.stdout_lines | length > 0 }}"
        has_missing_mounts: "{{ missing_mounts | length > 0 }}"

    - name: Determine most problematic mount point
      ansible.builtin.set_fact:
        problematic_mount: >-
          {%- if critical_disks | length > 0 -%}
            {{ critical_disks[0][5] | trim }}
          {%- elif warning_disks | length > 0 -%}
            {{ warning_disks[0][5] | trim }}
          {%- elif ro_mounts.stdout_lines | length > 0 -%}
            {{ ro_mounts.stdout_lines[0].split()[1] | trim }}
          {%- else -%}
            {{ df_result.stdout_lines[0].split(';')[5] | trim }}
          {%- endif -%}

    - name: Set storage responsibility message
      ansible.builtin.set_fact:
        storage_resp_message: >-
          {% if problematic_mount in __rhel_storage_managed_mounts %}
          <b style="color: #333;">Responsibility:</b> Managed (ict-linux)
          {% else %}
          <b style="color: #333;">Responsibility:</b> Customer Service / Application
          {% endif %}

    - name: Define storage status properties
      ansible.builtin.set_fact:
        storage_status_color: "{{ '#d9534f' if (critical_disks | length > 0 or has_ro_disks or has_missing_mounts) else ('#f0ad4e' if warning_disks | length > 0 else '#5cb85c') }}"
        storage_status_label: "{{ 'CRITICAL' if (critical_disks | length > 0 or has_ro_disks or has_missing_mounts) else ('WARNING' if warning_disks | length > 0 else 'OK') }}"
        storage_status_message: >-
          {{ 'Critical issues: Missing mounts, saturation or Read-Only detected.' if (critical_disks | length > 0 or has_ro_disks or has_missing_mounts)
             else ('Warning: Some partitions are exceeding 80% usage.' if warning_disks | length > 0
             else 'All monitored partitions are mounted and have sufficient space.') }}

    - name: Add Storage Status Summary Box
      ansible.builtin.set_fact:
        mail_content: |-
          {{ mail_content }}
          <div style="border: 1px solid {{ storage_status_color }}; padding: 10px; border-radius: 5px; background-color: {{ storage_status_color }}05; margin: 0 auto 15px auto; width: 95%; font-size: 0.9em;">
            <div style="text-align: center; margin-bottom: 8px;">
              <b style="font-size: 1.1em; color: {{ storage_status_color }}; text-transform: uppercase;">Status: {{ storage_status_label }}</b><br>
              <span style="color: #555;">{{ storage_status_message }}</span><br>
              <span style="font-size: 0.9em; color: #666;">{{ storage_resp_message }}</span>
            </div>

            <div style="margin-bottom: 8px; padding: 5px 10px; border-radius: 3px;">
              <b style="font-size: 0.85em; color: #333;">Support Checklist:</b><br>
              <span style="font-size: 0.85em;">
                {{ '❌' if has_missing_mounts else '✅' }} FSTAB Consistency (All partitions mounted)<br>
                {% if has_missing_mounts %}
                <span style="color: #d9534f; margin-left: 20px;">└ ⚠️ Missing: {{ missing_mounts | join(', ') }}</span><br>
                {% endif %}
                {{ '❌' if critical_disks | length > 0 else '✅' }} High Saturation Check (>90%)<br>
                {{ '⚠️' if warning_disks | length > 0 else '✅' }} Warning Saturation Check (>80%)<br>
                {{ '❌' if has_ro_disks else '✅' }} Write Permissions (Read-Only Check)
              </span>
            </div>
          </div>

    - name: Add Storage Table to mail
      ansible.builtin.set_fact:
        mail_content: |-
          {{ mail_content }}
          <table>
            <tr style="background-color: #e0e0e0;">
              <th colspan="6" style="padding: 10px; text-align: center; font-size: 1.1em;">Disk Usage Details</th>
            </tr>
            <tr style="background-color: #f5f5f5; font-size: 0.9em;">
              <th>Filesystem</th>
              <th>Size</th>
              <th>Used</th>
              <th>Avail</th>
              <th>Use%</th>
              <th>Mounted on</th>
            </tr>
            {% for line in df_result.stdout_lines %}
            {% set cells = line.split(';') %}
            {% set usage = cells[4] | replace('%', '') | int %}
            <tr style="{{ 'background-color: #f9f9f9;' if loop.index is even else 'background-color: #ffffff;' }}">
              <td>{{ cells[0] }}</td>
              <td>{{ cells[1] }}</td>
              <td>{{ cells[2] }}</td>
              <td>{{ cells[3] }}</td>
              <td style="{{ 'color: #d9534f; font-weight: bold;' if usage >= 90 else ('color: #f0ad4e; font-weight: bold;' if usage >= 80 else '') }}">
                {{ cells[4] }}
              </td>
              <td><b>{{ cells[5] }}</b></td>
            </tr>
            {% endfor %}
          </table>

    # -------------------------------------------------------------------------
    # Investigations
    # -------------------------------------------------------------------------

    - name: Initialize investigation HTML vars
      ansible.builtin.set_fact:
        saturation_investigation_html: ""
        ro_investigation_html: ""
        missing_mount_investigation_html: ""

    - name: Investigate saturated mount points
      ansible.builtin.shell: "du -ah --max-depth=2 {{ item[5] | trim }} 2>/dev/null | sort -rh | head -10"
      delegate_to: "{{ target_server }}"
      become: true
      register: du_investigation
      ignore_errors: true
      loop: "{{ (critical_disks + warning_disks) | unique }}"
      when: (critical_disks | length > 0) or (warning_disks | length > 0)

    - name: Build saturation investigation HTML
      ansible.builtin.set_fact:
        saturation_investigation_html: |-
          {% for result in du_investigation.results | default([]) %}
          {% if not result.skipped | default(false) and result.stdout_lines | default([]) | length > 0 %}
          <div style="margin-bottom: 12px;">
            <b style="font-size: 0.9em;">📂 Top consumers on <code>{{ result.item[5] | trim }}</code>:</b>
            <table style="margin-top: 5px; width: 100%;">
              <tr style="background-color: #f5f5f5; font-size: 0.85em;">
                <th style="padding: 4px 8px; text-align: left;">Size</th>
                <th style="padding: 4px 8px; text-align: left;">Path</th>
              </tr>
              {% for line in result.stdout_lines %}
              {% set parts = line.split('\t') %}
              <tr style="{{ 'background-color: #f9f9f9;' if loop.index is even else 'background-color: #ffffff;' }}">
                <td style="padding: 4px 8px; font-weight: bold; white-space: nowrap; width: 80px;">{{ parts[0] }}</td>
                <td style="padding: 4px 8px; font-family: monospace; font-size: 0.85em;">{{ parts[1] if parts | length > 1 else '' }}</td>
              </tr>
              {% endfor %}
            </table>
          </div>
          {% endif %}
          {% endfor %}
      when: (critical_disks | length > 0) or (warning_disks | length > 0)

    - name: Investigate Read-Only filesystems
      ansible.builtin.shell: |
        echo "=== dmesg — filesystem errors ==="
        dmesg | grep -iE "remount|read-only|i/o error|ext4-fs|xfs" | tail -20
        echo ""
        echo "=== journalctl — kernel filesystem events ==="
        journalctl -k --no-pager -n 10 --grep="remount|read-only|error" 2>/dev/null || true
      delegate_to: "{{ target_server }}"
      become: true
      register: ro_investigation
      ignore_errors: true
      when: has_ro_disks | bool

    - name: Build RO investigation HTML
      ansible.builtin.set_fact:
        ro_investigation_html: |-
          {% if ro_investigation.stdout_lines | default([]) | length > 0 %}
          <div style="margin-bottom: 12px;">
            <b style="font-size: 0.9em;">🔴 Read-Only filesystem — kernel log analysis:</b>
            <pre style="background-color: #f5f5f5; padding: 8px; margin-top: 5px; font-size: 0.78em; border: 1px solid #ddd; border-radius: 3px; overflow-x: auto; white-space: pre-wrap; word-break: break-all;">{{ ro_investigation.stdout }}</pre>
          </div>
          {% endif %}
      when: has_ro_disks | bool

    - name: Investigate missing mounts
      ansible.builtin.shell: >
        systemctl status $(systemd-escape --path --suffix=mount {{ item }}) --no-pager -l 2>&1 | head -30
      delegate_to: "{{ target_server }}"
      become: true
      register: mount_investigation
      ignore_errors: true
      loop: "{{ missing_mounts }}"
      when: has_missing_mounts | bool

    - name: Build missing mount investigation HTML
      ansible.builtin.set_fact:
        missing_mount_investigation_html: |-
          {% for result in mount_investigation.results | default([]) %}
          {% if not result.skipped | default(false) %}
          <div style="margin-bottom: 12px;">
            <b style="font-size: 0.9em;">⛔ Mount unit status for <code>{{ result.item }}</code>:</b>
            <pre style="background-color: #f5f5f5; padding: 8px; margin-top: 5px; font-size: 0.78em; border: 1px solid #ddd; border-radius: 3px; overflow-x: auto; white-space: pre-wrap; word-break: break-all;">{{ result.stdout }}</pre>
          </div>
          {% endif %}
          {% endfor %}
      when: has_missing_mounts | bool

    - name: Add Investigation Section to mail
      ansible.builtin.set_fact:
        mail_content: |-
          {{ mail_content }}
          <br>
          <div style="border: 1px solid #f0ad4e; padding: 8px; text-align: center; border-radius: 5px; margin-bottom: 10px; background-color: #fdf8f0;">
            <b style="font-size: 1.1em; color: #b8860b;">🔍 Storage Investigation</b>
          </div>
          <div style="width: 95%; margin: 0 auto; font-size: 0.9em; font-family: sans-serif;">
            {{ saturation_investigation_html }}
            {{ ro_investigation_html }}
            {{ missing_mount_investigation_html }}
          </div>
      when: (critical_disks | length > 0) or (warning_disks | length > 0) or has_ro_disks | bool or has_missing_mounts | bool

  rescue:
    - name: Add Storage Table Error to mail
      ansible.builtin.set_fact:
        mail_content: |-
          {{ mail_content }}
          <div style="border: 1px solid #d9534f; padding: 10px; text-align: center; width: 95%; margin: 0 auto; font-size: 0.9em;">
            <b style="color: #d9534f;">⚠️ ERROR: Unable to retrieve storage details.</b>
          </div>
