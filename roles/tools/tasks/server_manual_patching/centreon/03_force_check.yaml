# roles/tools/tasks/server_manual_patching/centreon/03_force_check.yaml

---
- name: Pause execution to let server recover from boot burst (2 minutes)
  ansible.builtin.command: sleep 120
  become: false
  when: patch_changed

- name: "CENTREON | Trigger bulk force check for host and services in one go"
  ansible.builtin.uri:
    url: "https://{{ __centreon_fqdn }}/centreon/api/latest/monitoring/resources/check"
    method: POST
    headers:
      X-AUTH-TOKEN: "{{ __centreon_token }}"
    body_format: json
    body: >-
      {% set resources_list = [{'type': 'host', 'id': centreon_host_id | int, 'parent': none}] %}
      {% for svc in host_services_response.json.result | default([]) %}
      {%   set _ = resources_list.append({'type': 'service', 'id': svc.id | int, 'parent': {'id': centreon_host_id | int}}) %}
      {% endfor %}
      {{ {'check': {'is_forced': true}, 'resources': resources_list} | to_json }}
    status_code: [200, 201, 204]
  delegate_to: localhost
  become: false

- name: Pause execution to let monitoring recover (7 minutes and 30s)
  ansible.builtin.command: sleep 450
  become: false
  when: patch_changed
