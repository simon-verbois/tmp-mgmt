# roles/tools/tasks/server_add_cpu/vcenter/get_cpu_info.yaml

---
- name: "VCENTER | Get CPU info block"
  delegate_to: localhost
  become: false
  when: not vcenter_action_done
  block:
    - name: "VCENTER | Search VM"
      ansible.builtin.include_tasks:
        file: search_vm.yaml

    - name: "VCENTER | Gather full VM information"
      community.vmware.vmware_guest_info:
        hostname: "{{ current_vcenter.value.url }}"
        username: "{{ current_vcenter.value.username }}"
        password: "{{ current_vcenter.value.password }}"
        validate_certs: false
        datacenter: "{{ vm_details.datacenter }}"
        uuid: "{{ vm_details.uuid }}"
      register: vm_all_info

    - name: "VCENTER | Get CPU hot-add status via REST API"
      ansible.builtin.shell:
        cmd: |
          SESSION=$(curl -sk -X POST \
            "https://{{ current_vcenter.value.url }}/rest/com/vmware/cis/session" \
            -u '{{ current_vcenter.value.username }}:{{ current_vcenter.value.password }}' \
            -H 'Content-Type: application/json' | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")

          curl -sk \
            "https://{{ current_vcenter.value.url }}/rest/vcenter/vm/{{ vm_details.moid }}" \
            -H "vmware-api-session-id: $SESSION" \
            -H 'Content-Type: application/json' | python3 -c "
          import sys, json
          data = json.load(sys.stdin)['value']
          print(json.dumps({
              'cpu_hot_add_enabled': data.get('cpu', {}).get('hot_add_enabled', False),
              'cpu_count': data.get('cpu', {}).get('count', 0),
              'cores_per_socket': data.get('cpu', {}).get('cores_per_socket', 1)
          }))"
      register: rest_cpu_raw
      changed_when: false
      no_log: true

    - name: "VCENTER | Parse REST API CPU response"
      ansible.builtin.set_fact:
        rest_cpu_info: "{{ rest_cpu_raw.stdout | from_json }}"

    - name: "VCENTER | Extract CPU configuration"
      vars:
        _hw_version: "{{ vm_all_info.instance.hw_version | default('vmx-13') }}"
        _hw_num: "{{ _hw_version | regex_replace('vmx-', '') | int }}"
        _hw_max_map:
          "7": 8
          "8": 32
          "9": 64
          "10": 64
          "11": 128
          "13": 128
          "14": 128
          "15": 128
          "17": 256
          "18": 256
          "19": 768
          "20": 768
          "21": 768
      ansible.builtin.set_fact:
        vcenter_cpu_info:
          num_cpus: "{{ vm_all_info.instance.hw_processor_count }}"
          cores_per_socket: "{{ vm_all_info.instance.hw_cores_per_socket | default(1) }}"
          hot_add_enabled: "{{ rest_cpu_info.cpu_hot_add_enabled }}"
          hw_version: "{{ _hw_version }}"
          hw_max_cpus: "{{ _hw_max_map[_hw_num | string] | default(128) }}"
          vm_name: "{{ vm_details.guest_name | default(inventory_hostname_short | lower) }}"
        vcenter_conn:
          hostname: "{{ current_vcenter.value.url }}"
          username: "{{ current_vcenter.value.username }}"
          password: "{{ current_vcenter.value.password }}"
          datacenter: "{{ vm_details.datacenter }}"
          uuid: "{{ vm_details.uuid }}"

    - name: "VCENTER | Break loop"
      ansible.builtin.set_fact:
        vcenter_action_done: true

  rescue:
    - name: "VCENTER | VM not found on {{ current_vcenter.value.url }}"
      ansible.builtin.debug:
        msg: "VM {{ inventory_hostname_short | lower }} not found, trying next vCenter..."