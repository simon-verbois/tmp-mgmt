# roles/tools/tasks/server_add_cpu/vcenter/extend_cpu.yaml

---
- name: "VCENTER | Apply CPU extension block"
  delegate_to: localhost
  become: false
  when: not vcenter_action_done | default(false)
  block:
    - name: "VCENTER | Search VM"
      ansible.builtin.include_tasks:
        file: search_vm.yaml

    - name: "VCENTER | Set CPU count to {{ requested_cpu_count }}"
      community.vmware.vmware_guest:
        hostname: "{{ current_vcenter.value.url }}"
        username: "{{ current_vcenter.value.username }}"
        password: "{{ current_vcenter.value.password }}"
        validate_certs: false
        datacenter: "{{ vm_details.datacenter }}"
        uuid: "{{ vm_details.uuid }}"
        hardware:
          num_cpus: "{{ requested_cpu_count | int }}"
          num_cpu_cores_per_socket: "{{ vcenter_cpu_info.cores_per_socket | int }}"
      register: cpu_extension_result

    - name: "VCENTER | Break loop"
      ansible.builtin.set_fact:
        vcenter_action_done: true

  rescue:
    - name: "VCENTER | Extension failed or VM not found on {{ current_vcenter.value.url }}"
      ansible.builtin.debug:
        msg: "VM not found on {{ current_vcenter.value.url }} or CPU extension failed. Check error above."