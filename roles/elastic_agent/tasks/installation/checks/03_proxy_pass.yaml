# roles/elastic_agent/tasks/installation/checks/03_proxy_pass.yaml

---
- block:
  - name: "Attempt to reach Fleet URL via proxy"
    ansible.builtin.uri:
      url: "{{ __elastic_console_url }}"
      method: GET
      validate_certs: no
      status_code: 404
    environment:
      https_proxy: "{{ __elastic_proxy_url }}"
    register: fleet_url_check
    ignore_errors: true

  - name: "Assert that the Fleet URL was reached (expecting 404)"
    ansible.builtin.assert:
      that:
        - fleet_url_check.status == 404
      fail_msg: "ASSERT FAILED: Failed to connect! Status was {{ fleet_url_check.status }} (expected 404). Error: {{ fleet_url_check.msg | default('N/A') }}"
      success_msg: "ASSERT PASSED: Proxy is correctly configured and {{ __elastic_console_url }} is reachable."
  when: __elastic_proxy_url is defined
