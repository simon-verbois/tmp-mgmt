# roles/elastic_agent/defaults/main.yaml

---
# Fleet / Enrollment
__elastic_console_url: "https://urlto.elastic.com:443"
__elastic_enrollment_token: "tokentoregistergivedbyclient"
# __elastic_proxy_url: "http://fortiproxy.casc.local:8080"

# Tarball source
__elastic_agent_tarball: "elastic-agent-9.3.0-linux-x86_64.tar.gz"
__internal_depot_url: "http://yumrepos.csv.local/depot"
__tmp_elastic_directory: "/opt/elastic_agent_tmp"

# Storage / LVM
__elastic_mount_path: "/opt/Elastic"
__elastic_vg_name: "vg_data"          # VG cible — toujours vg_data
__elastic_lv_name: "lv_opt_elastic"
__elastic_lv_size_gb: 5               # taille du LV à créer (Go)
__elastic_new_disk_size_gb: 10        # taille du nouveau disque vCenter si vg_data absent

# Espace disque — multiplicateurs de validation
__elastic_install_space_multiplier: 2.3   # espace requis sur __elastic_mount_path
__elastic_tmp_space_multiplier: 1.5       # espace requis sur __tmp_elastic_directory
