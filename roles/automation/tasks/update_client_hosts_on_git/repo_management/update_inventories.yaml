# roles/automation/tasks/update_client_hosts_on_git/repo_management/update_inventories.yaml

---
- name: "PROCESS | Inventory synchronization for {{ client_id }}"
  block:
    # -------------------------------------------------------------------------
    # 1. COLLECTE DES DONNÉES DEPUIS SATELLITE
    # -------------------------------------------------------------------------
    - name: "COLLECTING | List VMs from {{ __satellite_https_url }} for location {{ client_id }}"
      ansible.builtin.uri:
        url: "{{ __satellite_https_url }}/api/v2/locations/{{ client_id }}/hosts?per_page=9999"
        method: GET
        validate_certs: no
        headers:
          Accept: "application/json"
          Content-Type: "application/json"
        user: "{{ __satellite_svc_user }}"
        password: "{{ __satellite_svc_token }}"
        force_basic_auth: yes
        status_code: 200
      register: satellite_vms_response

    - name: "COLLECTING | Group VMs by lifecycle for {{ client_id }}"
      ansible.builtin.set_fact:
        grouped_vms: >-
          {% set groups = {} %}
          {% if satellite_vms_response.json.results is defined %}
            {% for host in satellite_vms_response.json.results %}
              {# On utilise 'Unknown' par défaut si le cycle de vie est absent #}
              {% set lifecycle = host.content_facet_attributes.lifecycle_environment_name | default('Unknown') %}
              {% set hostname = host.name %}
              {% if lifecycle not in groups %}
                {% set _ = groups.update({lifecycle: []}) %}
              {% endif %}
              {% set _ = groups[lifecycle].append(hostname) %}
            {% endfor %}
            {% for group_name in groups %}
              {% set _ = groups.update({group_name: groups[group_name] | sort }) %}
            {% endfor %}
          {% endif %}
          {{ groups | to_json }}

    # -------------------------------------------------------------------------
    # 2. PRÉPARATION DE L'INVENTAIRE
    # -------------------------------------------------------------------------
    - name: "INVENTORY | Generate hosts.ini content for {{ client_id }}"
      ansible.builtin.set_fact:
        inventory_content: |
          # This file is dynamically generated by Ansible for location: {{ client_id }}
          # Based on Red Hat Satellite VMs in client location.
          # Hosts without a lifecycle environment are grouped under [Unknown].
          # Generated on: {{ now(fmt='%Y-%m-%d %H:%M:%S') }}
          # Do not edit manually.
          
          {% for group_name, hosts in grouped_vms | from_json | dictsort %}
          [{{ group_name }}]
          {% for host in hosts %}
          {{ host }}
          {% endfor %}

          {% endfor %}
      when: (grouped_vms | from_json | length) > 0

    - name: "VALIDATION | Verify inventory content is not empty"
      ansible.builtin.assert:
        that:
          - inventory_content is defined
          - inventory_content | length > 0
        fail_msg: "Inventory content is empty for client {{ client_id }}. No hosts found in Satellite."

    # -------------------------------------------------------------------------
    # 3. INTERACTION AVEC GITLAB
    # -------------------------------------------------------------------------
    - name: "GITLAB | Get project details for {{ client_id }}"
      ansible.builtin.uri:
        url: "https://{{ __gitlab_fqdn }}/api/v4/projects/ict-las%2Fclients%2F{{ client_id | urlencode }}"
        method: GET
        validate_certs: no
        headers:
          PRIVATE-TOKEN: "{{ __gitlab_ictlas_token }}"
      register: gitlab_project_details

    - name: "GITLAB | Set target branch"
      ansible.builtin.set_fact:
        target_branch: "{{ gitlab_project_details.json.default_branch | default('main') }}"

    - name: "GITLAB | Check if hosts.ini exists for {{ client_id }}"
      ansible.builtin.uri:
        url: "https://{{ __gitlab_fqdn }}/api/v4/projects/ict-las%2Fclients%2F{{ client_id | urlencode }}/repository/files/hosts.ini?ref={{ target_branch }}"
        method: HEAD
        validate_certs: no
        headers:
          PRIVATE-TOKEN: "{{ __gitlab_ictlas_token }}"
        status_code: [200, 404]
      register: check_file_exists

    - name: "GITLAB | Define action and message"
      ansible.builtin.set_fact:
        gitlab_action: "{{ 'update' if check_file_exists.status == 200 else 'create' }}"
        commit_msg: "{{ 'Refresh' if check_file_exists.status == 200 else 'Create' }} satellite inventory for {{ client_id }}"

    - name: "GITLAB | Commit hosts.ini change ({{ gitlab_action }})"
      ansible.builtin.uri:
        url: "https://{{ __gitlab_fqdn }}/api/v4/projects/ict-las%2Fclients%2F{{ client_id | urlencode }}/repository/commits"
        method: POST
        validate_certs: no
        headers:
          PRIVATE-TOKEN: "{{ __gitlab_ictlas_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          branch: "{{ target_branch }}"
          commit_message: "Ansible: {{ commit_msg }}"
          actions:
            - action: "{{ gitlab_action }}"
              file_path: "hosts.ini"
              content: "{{ inventory_content }}"
        status_code: [201]
      changed_when: true

  # -------------------------------------------------------------------------
  # 4. GESTION DES ERREURS
  # -------------------------------------------------------------------------
  rescue:
    - name: "REPORTING | Capture failure for {{ client_id }}"
      ansible.builtin.debug:
        msg: "Failed to process client {{ client_id }}. Error: {{ ansible_failed_result.msg | default('Unknown error') }}"

    - name: "REPORTING | Add problematic client {{ client_id }} to list"
      ansible.builtin.set_fact:
        problematic_repos: "{{ problematic_repos | default([]) + [client_id] }}"
